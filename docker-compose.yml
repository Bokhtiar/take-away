services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: RestaurantPro
    restart: unless-stopped
    entrypoint: sh
    command: -c "composer install --no-interaction --prefer-dist && composer dump-autoload --no-scripts && php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8006:8000"
    volumes:
      - .:/var/www/html
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: restaurant_pro
      DB_USERNAME: restaurant_pro_user
      DB_PASSWORD: restaurant_pro_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel_network

  db:
    image: mysql:8.0
    container_name: RestaurantPro_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: restaurant_pro
      MYSQL_USER: restaurant_pro_user
      MYSQL_PASSWORD: restaurant_pro_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8087:3306"
    volumes:
      - restaurantpro_dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: RestaurantPro_phpmyadmin
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel_network

volumes:
  restaurantpro_dbdata:

networks:
  laravel_network:
    driver: bridge

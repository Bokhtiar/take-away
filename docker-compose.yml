services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myrestaurant-app
    ports:
      - "8006:8006"
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: myrestaurant-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myrestaurant
      MYSQL_USER: myrestaurant
      MYSQL_PASSWORD: myrestaurant
    ports:
      - "8086:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
